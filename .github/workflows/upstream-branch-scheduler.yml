name: Schedule Upstream Branch Builds

on:
  schedule:
    - cron: "30 12 * * *"
  workflow_dispatch: {}

permissions:
  actions: write
  contents: read

jobs:
  dispatch-branch-builds:
    runs-on: ubuntu-latest
    steps:
      - name: Discover upstream branches
        id: discover
        shell: bash
        run: |
          REPO_URL="https://github.com/citron-neo/emulator.git"
          git ls-remote --heads "$REPO_URL" \
            | awk '{print $2}' \
            | sed 's|refs/heads/||' \
            | grep -v '^main$' \
            > branches.txt

          COUNT=$(wc -l < branches.txt | tr -d ' ')
          echo "count=$COUNT" >> $GITHUB_OUTPUT
          echo "Discovered $COUNT upstream non-main branches."

      - name: Dispatch builds for each branch
        if: steps.discover.outputs.count != '0'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          while IFS= read -r BRANCH; do
            [ -z "$BRANCH" ] && continue
            echo "Dispatching builds for upstream branch: $BRANCH"
            gh workflow run build-windows.yml --ref main -f target_branch="$BRANCH"
            gh workflow run build-linux.yml --ref main -f target_branch="$BRANCH"
            gh workflow run build-android.yml --ref main -f target_branch="$BRANCH"
            gh workflow run build-macos.yml --ref main -f target_branch="$BRANCH"
          done < branches.txt
