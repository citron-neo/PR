name: Schedule Upstream Open PR Builds

on:
  schedule:
    - cron: "30 12 * * *"
  workflow_dispatch: {}

permissions:
  actions: write
  contents: read

jobs:
  dispatch-branch-builds:
    runs-on: ubuntu-latest
    steps:
      - name: Discover upstream branches
        id: discover
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api "repos/citron-neo/emulator/pulls?state=open&per_page=100" \
            --jq '.[] | select(.head.repo.full_name == "citron-neo/emulator") | .head.ref' \
            | sort -u \
            > branches.txt

          COUNT=$(wc -l < branches.txt | tr -d ' ')
          echo "count=$COUNT" >> $GITHUB_OUTPUT
          echo "Discovered $COUNT upstream open PR branches."

      - name: Dispatch builds for each branch
        if: steps.discover.outputs.count != '0'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          REPO="${{ github.repository }}"
          while IFS= read -r BRANCH; do
            [ -z "$BRANCH" ] && continue
            echo "Dispatching builds for upstream branch: $BRANCH"
            gh workflow run build-windows.yml -R "$REPO" --ref main -f target_branch="$BRANCH"
            gh workflow run build-linux.yml -R "$REPO" --ref main -f target_branch="$BRANCH"
            gh workflow run build-android.yml -R "$REPO" --ref main -f target_branch="$BRANCH"
            gh workflow run build-macos.yml -R "$REPO" --ref main -f target_branch="$BRANCH"
          done < branches.txt
