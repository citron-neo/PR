name: Notify Discord (PR and Branch Commits)

on:
  push:
    branches-ignore:
      - main
  pull_request:
    branches-ignore:
      - main
    types:
      - opened
      - reopened
      - synchronize

permissions:
  contents: read

jobs:
  notify-discord:
    runs-on: ubuntu-latest
    steps:
      - name: Build notification message
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            SHORT_SHA="${GITHUB_SHA::7}"
            printf "%s\n" \
              "🌿 **Branch Commit**" \
              "Repository: \`${{ github.repository }}\`" \
              "Branch: \`${{ github.ref_name }}\`" \
              "Author: ${{ github.event.head_commit.author.name }}" \
              "Commit: [\`${SHORT_SHA}\`](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }})" \
              "Message: ${{ github.event.head_commit.message }}" \
              > message.txt
          else
            HEAD_SHA="${{ github.event.pull_request.head.sha }}"
            SHORT_SHA="${HEAD_SHA::7}"
            printf "%s\n" \
              "🔀 **Pull Request Commit Update**" \
              "Repository: \`${{ github.repository }}\`" \
              "PR: [#${{ github.event.pull_request.number }} ${{ github.event.pull_request.title }}](${{ github.event.pull_request.html_url }})" \
              "Source Branch: \`${{ github.event.pull_request.head.ref }}\`" \
              "Target Branch: \`${{ github.event.pull_request.base.ref }}\`" \
              "Latest Commit: [\`${SHORT_SHA}\`](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.event.pull_request.head.sha }})" \
              > message.txt
          fi

      - name: Post message to Discord webhook
        shell: bash
        run: |
          PAYLOAD=$(python3 - <<'PY'
          import json
          from pathlib import Path
          message = Path("message.txt").read_text(encoding="utf-8")
          print(json.dumps({"content": message}))
          PY
          )
          curl -sS -H "Content-Type: application/json" \
            -X POST \
            -d "$PAYLOAD" \
            "${{ secrets.DISCORD_WEBHOOK }}"
