name: Build Citron (Android)

concurrency:
  group: build-android-${{ inputs.target_branch || github.event.pull_request.head.ref || github.ref }}
  cancel-in-progress: true

on:
  push:
    branches-ignore:
      - main
  pull_request:
    branches-ignore:
      - main
  schedule:
    - cron: "0 12 * * *"
  workflow_dispatch:
    inputs:
      target_branch:
        description: "Upstream citron-neo/emulator branch to build"
        required: false
        type: string
      pr_number:
        description: "PR number to comment on"
        required: false
        type: string
      head_repo:
        description: "Head repo to clone from (e.g. user/emulator)"
        required: false
        type: string

jobs:
  check-version:
    name: Check if build needed
    runs-on: ubuntu-latest
    outputs:
      should_build: ${{ steps.compare.outputs.should_build }}
      new_hash: ${{ steps.upstream.outputs.hash_short }}
      new_hash_full: ${{ steps.upstream.outputs.hash_full }}
      branch_name: ${{ steps.upstream.outputs.branch_name }}
      head_repo: ${{ steps.upstream.outputs.head_repo }}
      pr_number: ${{ steps.upstream.outputs.pr_number }}
    steps:
      - name: Checkout this repo
        uses: actions/checkout@v4
      - name: Get upstream commit hash
        id: upstream
        run: |
          PR_NUMBER="${{ inputs.pr_number }}"
          TARGET_BRANCH="${{ inputs.target_branch }}"
          HEAD_REPO="${{ inputs.head_repo }}"

          if [ -z "$PR_NUMBER" ] && [ "${{ github.event_name }}" = "pull_request" ]; then
            PR_NUMBER="${{ github.event.pull_request.number }}"
            TARGET_BRANCH="${{ github.event.pull_request.head.ref }}"
            HEAD_REPO="${{ github.event.pull_request.head.repo.full_name }}"
          fi

          if [ -z "$HEAD_REPO" ]; then HEAD_REPO="citron-neo/emulator"; fi
          if [ -z "$TARGET_BRANCH" ]; then TARGET_BRANCH="main"; fi

          REPO_URL="https://github.com/${HEAD_REPO}.git"
          FULL_HASH=$(git ls-remote "$REPO_URL" "refs/heads/$TARGET_BRANCH" | cut -f1 | head -n1)
          
          if [ -z "$FULL_HASH" ]; then
            REPO_URL="https://github.com/citron-neo/emulator.git"
            TARGET_BRANCH="main"
            FULL_HASH=$(git ls-remote "$REPO_URL" HEAD | cut -f1)
          fi

          SHORT_HASH=$(echo "$FULL_HASH" | cut -c1-7)
          echo "branch_name=$TARGET_BRANCH" >> $GITHUB_OUTPUT
          echo "hash_short=$SHORT_HASH" >> $GITHUB_OUTPUT
          echo "hash_full=$FULL_HASH" >> $GITHUB_OUTPUT
          echo "head_repo=$HEAD_REPO" >> $GITHUB_OUTPUT
          echo "pr_number=$PR_NUMBER" >> $GITHUB_OUTPUT

      - name: Check if already built
        id: built_check
        run: |
          HASH="${{ steps.upstream.outputs.hash_full }}"
          WORKFLOW_FILE="build-android.yml"
          COUNT=$(gh api "repos/${{ github.repository }}/actions/workflows/${WORKFLOW_FILE}/runs?status=success&per_page=100" --jq "[.workflow_runs[] | select(.head_sha == \"${HASH}\") | select(.id != ${{ github.run_id }})] | length")
          echo "already_built=$([ "$COUNT" -gt 0 ] && echo true || echo false)" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ secrets.EMULATOR_PR_TOKEN }}

      - name: Compare versions
        id: compare
        run: |
          if [ "${{ steps.built_check.outputs.already_built }}" = "true" ] && [ "${{ github.event_name }}" = "schedule" ]; then
            echo "should_build=false" >> $GITHUB_OUTPUT
          else
            echo "should_build=true" >> $GITHUB_OUTPUT
          fi

  build-android:
    name: Build Android APK
    needs: [check-version]
    if: needs.check-version.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Clone Citron Source
        run: |
          git clone --recursive -b "${{ needs.check-version.outputs.branch_name }}" "https://github.com/${{ needs.check-version.outputs.head_repo }}.git" citron_source
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq wget unzip curl git cmake build-essential pkg-config zip glslang-tools nasm perl autoconf automake libtool yasm

      - name: Install Android SDK & NDK
        run: |
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
          unzip -q commandlinetools-linux-11076708_latest.zip
          mkdir -p android-sdk/cmdline-tools; mv cmdline-tools android-sdk/cmdline-tools/latest
          export ANDROID_HOME=$PWD/android-sdk
          export PATH=$PATH:$ANDROID_HOME/cmdline-tools/latest/bin
          yes | sdkmanager --licenses > /dev/null || true
          sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0" "ndk;26.1.10909125"
          echo "ANDROID_HOME=$ANDROID_HOME" >> $GITHUB_ENV
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/26.1.10909125" >> $GITHUB_ENV

      - name: Build APK
        working-directory: ./citron_source/src/android
        run: |
          export ANDROID_SDK_ROOT="$ANDROID_HOME"
          export ANDROID_NDK="$ANDROID_NDK_HOME"
          chmod +x gradlew
          ./gradlew assembleMainlineRelease -Pcmake.args="-DENABLE_QT=OFF -DENABLE_SDL2=OFF -DENABLE_WEB_SERVICE=OFF -DENABLE_OPENSSL=OFF -DCITRON_USE_BUNDLED_VCPKG=ON -DCITRON_USE_BUNDLED_FFMPEG=ON -DCITRON_ENABLE_LTO=ON -DCITRON_BUILD_TYPE=Release"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: citron-android-pr-${{ needs.check-version.outputs.pr_number }}
          path: citron_source/src/android/app/build/outputs/apk/mainline/release/*.apk

  build-android-8elite:
    name: Build Android APK (Snapdragon 8 Elite)
    needs: [check-version]
    if: needs.check-version.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Clone Citron Source
        run: |
          git clone --recursive -b "${{ needs.check-version.outputs.branch_name }}" "https://github.com/${{ needs.check-version.outputs.head_repo }}.git" citron_source
      
      - name: Apply 8 Elite Patches
        working-directory: ./citron_source
        run: |
          sed -i '/if (!handle) {/,/}/c\    if (!handle) {\n        handle = dlopen("libvulkan.so", RTLD_NOW);\n    }' src/android/app/src/main/jni/native.cpp
          sed -i '/bool IsShaderInt64Supported() const {/a \        const auto driver = GetDriverID();\n        if (driver == VK_DRIVER_ID_QUALCOMM_PROPRIETARY) {\n            return false;\n        }' src/video_core/vulkan_common/vulkan_device.h
          sed -i '/bool IsExtShaderAtomicInt64Supported() const {/a \        const auto driver = GetDriverID();\n        if (driver == VK_DRIVER_ID_QUALCOMM_PROPRIETARY) {\n            return false;\n        }' src/video_core/vulkan_common/vulkan_device.h
          sed -i '/const auto device_id =/d' src/video_core/vulkan_common/vulkan_device.cpp
          sed -i 's/\bdevice_id\b/properties.properties.deviceID/g' src/video_core/vulkan_common/vulkan_device.cpp
          sed -i 's/if (is_qualcomm) {/if (driver_id == VK_DRIVER_ID_QUALCOMM_PROPRIETARY) {/' src/video_core/vulkan_common/vulkan_device.cpp

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq wget unzip curl git cmake build-essential pkg-config zip glslang-tools nasm perl autoconf automake libtool yasm

      - name: Install Android SDK & NDK
        run: |
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
          unzip -q commandlinetools-linux-11076708_latest.zip
          mkdir -p android-sdk/cmdline-tools; mv cmdline-tools android-sdk/cmdline-tools/latest
          export ANDROID_HOME=$PWD/android-sdk
          export PATH=$PATH:$ANDROID_HOME/cmdline-tools/latest/bin
          yes | sdkmanager --licenses > /dev/null || true
          sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0" "ndk;26.1.10909125"
          echo "ANDROID_HOME=$ANDROID_HOME" >> $GITHUB_ENV
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/26.1.10909125" >> $GITHUB_ENV

      - name: Build APK (8 Elite)
        working-directory: ./citron_source/src/android
        run: |
          export ANDROID_SDK_ROOT="$ANDROID_HOME"
          export ANDROID_NDK="$ANDROID_NDK_HOME"
          chmod +x gradlew
          ./gradlew assembleMainlineRelease -Pcmake.args="-DENABLE_QT=OFF -DENABLE_SDL2=OFF -DENABLE_WEB_SERVICE=OFF -DENABLE_OPENSSL=OFF -DCITRON_USE_BUNDLED_VCPKG=ON -DCITRON_USE_BUNDLED_FFMPEG=ON -DCITRON_ENABLE_LTO=ON -DCITRON_BUILD_TYPE=Release"

      - name: Upload APK (8 Elite)
        uses: actions/upload-artifact@v4
        with:
          name: citron-android-8elite-pr-${{ needs.check-version.outputs.pr_number }}
          path: citron_source/src/android/app/build/outputs/apk/mainline/release/*.apk

  comment:
    name: Comment on PR
    needs: [check-version, build-android, build-android-8elite]
    if: always() && needs.check-version.outputs.pr_number != ''
    runs-on: ubuntu-latest
    steps:
      - name: Create Comment
        env:
          GH_TOKEN: ${{ secrets.EMULATOR_PR_TOKEN }}
          PR_NUMBER: ${{ needs.check-version.outputs.pr_number }}
          RUN_ID: ${{ github.run_id }}
        run: |
          BODY="🤖 **Android Builds for PR #${PR_NUMBER} are ready!**

          Includes Standard and Snapdragon 8 Elite (Qualcomm optimized) APKs.
          
          [Download Artifacts](https://github.com/${{ github.repository }}/actions/runs/${RUN_ID})

          *Check the Actions run for APK files.*"
          
          EXISTING_COMMENT=$(gh pr view $PR_NUMBER -R citron-neo/emulator --json comments --jq ".comments[] | select(.body | contains(\"Android Builds for PR #${PR_NUMBER} are ready\")) | .id" | tail -n 1)
          
          if [ -n "$EXISTING_COMMENT" ]; then
            gh api -X PATCH "repos/citron-neo/emulator/issues/comments/$EXISTING_COMMENT" -f body="$BODY"
          else
            gh pr comment $PR_NUMBER -R citron-neo/emulator --body "$BODY"
          fi
