name: Build Citron (Windows)

concurrency:
  group: build-windows-${{ inputs.target_branch || github.event.pull_request.head.ref || github.ref }}
  cancel-in-progress: true

on:
  push:
    branches-ignore:
      - main
  pull_request:
    branches-ignore:
      - main
  schedule:
    - cron: "0 12 * * *"
  workflow_dispatch:
    inputs:
      target_branch:
        description: "Upstream citron-neo/emulator branch to build"
        required: false
        type: string
      pr_number:
        description: "PR number to comment on"
        required: false
        type: string
      head_repo:
        description: "Head repo to clone from (e.g. user/emulator)"
        required: false
        type: string

jobs:
  check-version:
    name: Check if build needed
    runs-on: ubuntu-latest
    outputs:
      should_build: ${{ steps.compare.outputs.should_build }}
      new_hash: ${{ steps.upstream.outputs.hash_short }}
      new_hash_full: ${{ steps.upstream.outputs.hash_full }}
      branch_name: ${{ steps.upstream.outputs.branch_name }}
      head_repo: ${{ steps.upstream.outputs.head_repo }}
      pr_number: ${{ steps.upstream.outputs.pr_number }}
    steps:
      - name: Checkout this repo
        uses: actions/checkout@v4
      - name: Get upstream commit hash
        id: upstream
        run: |
          PR_NUMBER="${{ inputs.pr_number }}"
          TARGET_BRANCH="${{ inputs.target_branch }}"
          HEAD_REPO="${{ inputs.head_repo }}"

          if [ -z "$PR_NUMBER" ] && [ "${{ github.event_name }}" = "pull_request" ]; then
            PR_NUMBER="${{ github.event.pull_request.number }}"
            TARGET_BRANCH="${{ github.event.pull_request.head.ref }}"
            HEAD_REPO="${{ github.event.pull_request.head.repo.full_name }}"
          fi

          if [ -z "$HEAD_REPO" ]; then HEAD_REPO="citron-neo/emulator"; fi
          if [ -z "$TARGET_BRANCH" ]; then TARGET_BRANCH="main"; fi

          REPO_URL="https://github.com/${HEAD_REPO}.git"
          FULL_HASH=$(git ls-remote "$REPO_URL" "refs/heads/$TARGET_BRANCH" | cut -f1 | head -n1)
          
          if [ -z "$FULL_HASH" ]; then
            REPO_URL="https://github.com/citron-neo/emulator.git"
            TARGET_BRANCH="main"
            FULL_HASH=$(git ls-remote "$REPO_URL" HEAD | cut -f1)
          fi

          SHORT_HASH=$(echo "$FULL_HASH" | cut -c1-7)
          echo "branch_name=$TARGET_BRANCH" >> $GITHUB_OUTPUT
          echo "hash_short=$SHORT_HASH" >> $GITHUB_OUTPUT
          echo "hash_full=$FULL_HASH" >> $GITHUB_OUTPUT
          echo "head_repo=$HEAD_REPO" >> $GITHUB_OUTPUT
          echo "pr_number=$PR_NUMBER" >> $GITHUB_OUTPUT

      - name: Check if already built
        id: built_check
        run: |
          HASH="${{ steps.upstream.outputs.hash_full }}"
          WORKFLOW_FILE="build-windows.yml"
          COUNT=$(gh api "repos/${{ github.repository }}/actions/workflows/${WORKFLOW_FILE}/runs?status=success&per_page=100" --jq "[.workflow_runs[] | select(.head_sha == \"${HASH}\") | select(.id != ${{ github.run_id }})] | length")
          echo "already_built=$([ "$COUNT" -gt 0 ] && echo true || echo false)" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Compare versions
        id: compare
        run: |
          if [ "${{ steps.built_check.outputs.already_built }}" = "true" ] && [ "${{ github.event_name }}" = "schedule" ]; then
            echo "should_build=false" >> $GITHUB_OUTPUT
          else
            echo "should_build=true" >> $GITHUB_OUTPUT
          fi

  build-msvc:
    name: "Citron Build (Windows MSVC - x64)"
    needs: [check-version]
    if: needs.check-version.outputs.should_build == 'true'
    runs-on: windows-latest
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4
      - name: Install Vulkan SDK
        shell: pwsh
        run: |
          $vulkan_sdk_url = "https://sdk.lunarg.com/sdk/download/1.3.283.0/windows/VulkanSDK-1.3.283.0-Installer.exe"
          Invoke-WebRequest -Uri $vulkan_sdk_url -OutFile VulkanSDK-Installer.exe
          Start-Process -FilePath ".\VulkanSDK-Installer.exe" -ArgumentList "--accept-licenses", "--default-answer", "--confirm-command", "install" -Wait
          echo "C:\VulkanSDK\1.3.283.0\Bin" | Out-File -FilePath $env:GITHUB_PATH -Append

      - name: Clone Citron Source
        shell: bash
        run: |
          REPO_URL="https://github/${{ needs.check-version.outputs.head_repo }}.git"
          if [[ "${{ needs.check-version.outputs.head_repo }}" != *"/"* ]]; then REPO_URL="https://github.com/citron-neo/emulator.git"; fi
          git clone --recursive -b "${{ needs.check-version.outputs.branch_name }}" "https://github.com/${{ needs.check-version.outputs.head_repo }}.git" citron

      - name: Cache vcpkg and Qt
        uses: actions/cache@v4
        with:
          path: |
            ./citron/build
            ~/.vcpkg/archives
            ${{ env.LOCALAPPDATA }}\vcpkg\archives
          key: vcpkg-qt-cache-x64-${{ runner.os }}-${{ hashFiles('citron/vcpkg.json') }}
          restore-keys: vcpkg-qt-cache-x64-${{ runner.os }}-

      - name: Configure CMake
        working-directory: ./citron
        shell: cmd
        run: |
          cmake -B build -S . -G "Visual Studio 17 2022" -A x64 ^
            -DCITRON_USE_BUNDLED_VCPKG=ON -DCITRON_BUILD_TYPE=Release -DCITRON_ENABLE_LTO=ON ^
            -DCITRON_USE_BUNDLED_QT=ON -DENABLE_QT6=ON -DCITRON_TESTS=OFF -DUSE_DISCORD_PRESENCE=ON ^
            -DENABLE_WEB_SERVICE=ON -DENABLE_OPENSSL=ON -DCITRON_USE_AUTO_UPDATER=ON -DCITRON_ENABLE_LIBARCHIVE=ON

      - name: Build
        working-directory: ./citron
        shell: cmd
        run: cmake --build build --config Release --parallel

      - name: Package
        shell: pwsh
        run: |
          mkdir dist; mkdir temp_package
          Get-ChildItem ".\citron\build\bin\Release\" -Recurse | Where-Object { $_.Extension -ne ".pdb" } | ForEach-Object {
            $relativePath = $_.FullName.Replace((Resolve-Path ".\citron\build\bin\Release\").Path, "").TrimStart('\')
            $destPath = Join-Path ".\temp_package" $relativePath
            $destDir = Split-Path $destPath -Parent
            if (!(Test-Path $destDir)) { New-Item -ItemType Directory -Path $destDir -Force | Out-Null }
            Copy-Item $_.FullName $destPath -Force
          }
          Compress-Archive -Path ".\temp_package\*" -DestinationPath ".\dist\Citron-PR-${{ needs.check-version.outputs.pr_number }}-MSVC-x64.zip"

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: Citron-Windows-MSVC
          path: "dist/*.zip"

  build-clangtron:
    name: "Citron Build (Windows Clangtron - x64)"
    needs: [check-version]
    if: needs.check-version.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 240
    steps:
      - uses: actions/checkout@v4
      - name: Clone Citron Source
        run: git clone "https://github.com/${{ needs.check-version.outputs.head_repo }}.git" citron -b "${{ needs.check-version.outputs.branch_name }}"
      - name: Setup Clangtron
        working-directory: ./citron
        run: |
          chmod +x build-clangtron-windows.sh
          ./build-clangtron-windows.sh setup
          echo "${HOME}/.cache/cpm/llvm-mingw/bin" >> "$GITHUB_PATH"
      - name: Build
        working-directory: ./citron
        run: |
          export CITRON_BUILD_TYPE=Release
          ./build-clangtron-windows.sh use --pgo none --lto full
      - name: Package
        run: |
          mkdir dist
          cd ./citron/build/use-nopgo/bin
          zip -r "${GITHUB_WORKSPACE}/dist/Citron-PR-${{ needs.check-version.outputs.pr_number }}-Clangtron-x64.zip" .
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: Citron-Windows-Clangtron
          path: "dist/*.zip"

  comment:
    name: Comment on PR
    needs: [check-version, build-msvc, build-clangtron]
    if: always() && needs.check-version.outputs.pr_number != ''
    runs-on: ubuntu-latest
    steps:
      - name: Create Comment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ needs.check-version.outputs.pr_number }}
          RUN_ID: ${{ github.run_id }}
        run: |
          BODY="🛠️ **Windows Builds for PR #${PR_NUMBER} are ready!**

          | Toolchain | Artifact |
          |-----------|----------|
          | MSVC | [Download](https://github.com/${{ github.repository }}/actions/runs/${RUN_ID}) |
          | Clangtron | [Download](https://github.com/${{ github.repository }}/actions/runs/${RUN_ID}) |

          *Check the Actions run for individual zip files.*"
          
          # Check if we already commented to avoid spamming
          EXISTING_COMMENT=$(gh pr view $PR_NUMBER -R citron-neo/emulator --json comments --jq ".comments[] | select(.body | contains(\"Windows Builds for PR #${PR_NUMBER} are ready\")) | .id" | tail -n 1)
          
          if [ -n "$EXISTING_COMMENT" ]; then
            gh api -X PATCH "repos/citron-neo/emulator/issues/comments/$EXISTING_COMMENT" -f body="$BODY"
          else
            gh pr comment $PR_NUMBER -R citron-neo/emulator --body "$BODY"
          fi
